services:
  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - kero-network
    expose:
      - "3000"
    environment:
      - NODE_ENV=production

  # Backend (Express.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - kero-network
    expose:
      - "4000"
    env_file:
      - ./backend/.env
    depends_on:
      - mysql
      - redis

  # MySQL Database
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - kero-network
    environment:
      MYSQL_ROOT_PASSWORD: root1234!
      MYSQL_DATABASE: kero
      MYSQL_USER: kero
      MYSQL_PASSWORD: kero1234!
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  # Redis
  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - kero-network
    volumes:
      - redis_data:/data

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - kero-network

networks:
  kero-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
